name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository (no LFS history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to Hugging Face Space (clean snapshot)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Git identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # Clone HF Space as a CLEAN repo
          git clone https://murtaza19:${HF_TOKEN}@huggingface.co/spaces/murtaza19/TruthTrack hf-space

          # Remove everything in HF repo except .git
          find hf-space -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          # Copy CURRENT GitHub working tree into HF Space
          rsync -av ./ hf-space \
            --exclude .git \
            --exclude .github \
            --exclude hf-space

          # Commit and push
          cd hf-space
          git add .
          git commit -m "Deploy snapshot from GitHub" || echo "No changes to commit"
          git push
