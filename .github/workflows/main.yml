name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository (no LFS history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to Hugging Face Space (clean snapshot)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
            huggingface-cli upload . \
            --repo-id murtaza19/TruthTrack \
            --repo-type space \
            --commit-message "Deploy from GitHub CI" \
            --ignore ".git,.github"