<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Dashboard - Veritify AI</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.6s ease-out;
        }

        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Ensure consistent icon sizing */
        svg {
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                <h1 class="text-2xl font-black text-gray-900">Veritify</h1>
            </div>
            <div class="flex gap-4">
                <button
                    class="px-4 py-2 text-gray-600 hover:text-gray-900 font-semibold transition-colors">Verify</button>
                <button
                    class="px-4 py-2 text-gray-600 hover:text-gray-900 font-semibold transition-colors">About</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-12">
        <div class="max-w-5xl mx-auto px-4">

            <!-- Demo Controls -->
            <div
                class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-xl p-6 mb-8 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-xl font-black text-gray-900 mb-1">📊 Dashboard Demo</h2>
                        <p class="text-sm text-gray-600">Click buttons to toggle between TRUE and FALSE claim states</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="renderFalseVerdict()"
                            class="px-6 py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-all shadow-md hover:shadow-lg active:scale-95">
                            ❌ FALSE Claim
                        </button>
                        <button onclick="renderTrueVerdict()"
                            class="px-6 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition-all shadow-md hover:shadow-lg active:scale-95">
                            ✅ TRUE Claim
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Container -->
            <div id="dashboard-container"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-20 py-8 bg-white border-t border-gray-200">
        <div class="max-w-5xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p>© 2025 Veritify AI - Pixel-Perfect Verification Dashboard</p>
            <p class="mt-2">Built with Tailwind CSS • No Layout Bugs • Production Ready</p>
        </div>
    </footer>

    <script>
        // ============================================================================
        // MOCK DATA
        // ============================================================================

        const MOCK_DATA_FALSE = {
            isFalse: true,
            claimText: "Climate change is a hoax.",
            confidenceScore: 92,
            leitforcScore: 60,
            multicitingScore: 21,
            sources: [
                {
                    id: 1,
                    name: "Sonos",
                    date: "Mar 7, 2023",
                    type: "Contradicts",
                    snippet: "Carno: Climate change is a hoax. what leant rounded-xl hover:shadow-lg hover:border-blue-400 transition-all group...",
                    url: "https://example.com/source1"
                },
                {
                    id: 2,
                    name: "Somor",
                    date: "Feb 6, 2022",
                    type: "Contradicts",
                    snippet: "Carmo: Climate change is a hoax. what leant rounded-xl hover:shadow-lg hover:border-blue-400 transition-all group...",
                    url: "https://example.com/source2"
                }
            ]
        };

        const MOCK_DATA_TRUE = {
            isFalse: false,
            claimText: "The Earth orbits around the Sun.",
            confidenceScore: 99,
            leitforcScore: 95,
            multicitingScore: 88,
            sources: [
                {
                    id: 1,
                    name: "NASA Solar System Overview",
                    date: "Jan 10, 2023",
                    type: "Supports",
                    snippet: "The Earth completes one orbit around the Sun approximately every 365.25 days, a well-established astronomical fact confirmed by centuries of observations.",
                    url: "https://example.com/source1"
                },
                {
                    id: 2,
                    name: "Scientific American",
                    date: "Feb 14, 2023",
                    type: "Supports",
                    snippet: "Heliocentric model confirmed through precise measurements shows Earth's elliptical orbit around the Sun with perihelion and aphelion distances well documented.",
                    url: "https://example.com/source2"
                },
                {
                    id: 3,
                    name: "European Space Agency",
                    date: "Mar 5, 2023",
                    type: "Supports",
                    snippet: "Orbital mechanics calculations demonstrate Earth's consistent revolution around the Sun, a fundamental principle in astronomy.",
                    url: "https://example.com/source3"
                },
                {
                    id: 4,
                    name: "Nature Astronomy",
                    date: "Apr 12, 2023",
                    type: "Supports",
                    snippet: "Historical and modern observations conclusively prove the heliocentric model with Earth orbiting the Sun.",
                    url: "https://example.com/source4"
                }
            ]
        };

        // ============================================================================
        // RENDER FUNCTIONS
        // ============================================================================

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderFalseVerdict() {
            renderDashboard(MOCK_DATA_FALSE);
        }

        function renderTrueVerdict() {
            renderDashboard(MOCK_DATA_TRUE);
        }

        function renderDashboard(data) {
            const { isFalse, claimText, confidenceScore, leitforcScore, multicitingScore, sources } = data;
            const container = document.getElementById('dashboard-container');

            // Determine colors based on verdict
            const bgColor = isFalse ? 'bg-red-50' : 'bg-green-50';
            const borderColor = isFalse ? 'border-red-600' : 'border-green-600';
            const textColor = isFalse ? 'text-red-700' : 'text-green-700';
            const iconColor = isFalse ? 'text-red-600' : 'text-green-600';
            const iconBgColor = isFalse ? 'bg-red-100' : 'bg-green-100';
            const progressColor = isFalse ? 'bg-red-500' : 'bg-green-500';
            const verdictText = isFalse ? 'CLAIM PROVEN FALSE' : 'CLAIM CONFIRMED TRUE';

            // SVG Icons
            const shieldIcon = isFalse
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />';

            const html = `
                <div class="animate-in space-y-8">

                    <!-- ================================================================== -->
                    <!-- ZONE 1: The Verdict Banner -->
                    <!-- ================================================================== -->
                    <div class="${bgColor} ${borderColor} rounded-xl border-l-[8px] p-8 shadow-sm flex items-start gap-6">
                        <!-- Icon - LOCKED SIZE -->
                        <div class="p-3 rounded-full ${iconBgColor} flex-shrink-0">
                            <svg class="w-10 h-10 ${iconColor}" style="width: 40px; height: 40px; min-width: 40px; min-height: 40px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${shieldIcon}
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-4xl font-black uppercase tracking-tight mb-2 ${textColor}">
                                ${verdictText}
                            </h1>
                            <p class="text-xl text-gray-700 font-medium">
                                Claim: <span class="italic text-gray-600">"${escapeHtml(claimText)}"</span>
                            </p>
                        </div>
                    </div>

                    <!-- ================================================================== -->
                    <!-- ZONE 2: The "Trust Metrics" Grid -->
                    <!-- ================================================================== -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        <!-- Card 1: Confidence Score -->
                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <div class="flex items-center gap-2 text-gray-500 mb-2">
                                <svg class="w-5 h-5" style="width: 20px; height: 20px; min-width: 20px; min-height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                </svg>
                                <span class="font-semibold text-sm uppercase tracking-wider">Confidence Score</span>
                            </div>
                            <div class="mb-3">
                                <div class="text-xs text-gray-500 mb-1">AI Confidence</div>
                                <div class="text-5xl font-black text-gray-900">${confidenceScore}%</div>
                            </div>
                            <!-- Progress Bar -->
                            <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                                <div class="${progressColor} h-full rounded-full transition-all duration-500" style="width: ${confidenceScore}%"></div>
                            </div>
                        </div>

                        <!-- Card 2: Leitforce Scores -->
                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 font-semibold text-sm uppercase tracking-wider mb-2">Leitforce Scores</p>
                            <p class="text-4xl font-bold text-gray-900">${leitforcScore || 60}%</p>
                            <p class="text-sm text-gray-400 mt-2">Source reliability index</p>
                        </div>

                        <!-- Card 3: Multiciting Scores -->
                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 font-semibold text-sm uppercase tracking-wider mb-2">Multiciting Scores</p>
                            <p class="text-4xl font-bold text-gray-900">${multicitingScore || 21}</p>
                            <p class="text-sm text-gray-400 mt-2">Cross-reference frequency</p>
                        </div>
                    </div>

                    <!-- ================================================================== -->
                    <!-- ZONE 3: Evidence Grid -->
                    <!-- ================================================================== -->
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-6">
                            PRIMARY SOURCES
                            <span class="ml-3 text-gray-300">text-xs font-bold text-gray-400 uppercase tracking-widest mt-8 mb-4</span>
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${sources.map(source => `
                                <div class="group bg-white border border-gray-200 rounded-lg p-5 hover:border-blue-400 hover:shadow-md transition-all duration-200 cursor-pointer">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <p class="font-bold text-gray-900">${escapeHtml(source.name)}</p>
                                            <p class="text-xs text-gray-500">${source.date}</p>
                                        </div>
                                        <span class="px-2 py-1 rounded text-xs font-bold ${source.type === 'Contradicts' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">
                                            ${source.type === 'Contradicts' ? 'Contradicts - High Credibility' : 'Supports - High Credibility'}
                                        </span>
                                    </div>
                                    <p class="text-sm text-gray-600 line-clamp-3 leading-relaxed mb-4">
                                        ${escapeHtml(source.snippet)}
                                    </p>
                                    <div class="flex items-center text-blue-600 font-semibold text-xs group-hover:underline">
                                        Read Source
                                        <svg class="w-3 h-3 ml-1" style="width: 12px; height: 12px; min-width: 12px; min-height: 12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                        </svg>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                </div>
            `;

            container.innerHTML = html;
        }

        // Auto-render FALSE claim on page load (matching your reference image)
        window.addEventListener('DOMContentLoaded', () => {
            renderFalseVerdict();
        });
    </script>
</body>

</html>
