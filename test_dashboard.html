<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Verification Dashboard</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Custom animations for dashboard */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.6s ease-out;
        }

        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Ensure consistent icon sizing */
        svg {
            flex-shrink: 0;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-8">Test Your Real Dashboard</h1>

        <div class="mb-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Simulate API Response</h2>
            <button onclick="testFalseVerdict()" class="px-6 py-3 bg-red-600 text-white font-bold rounded mr-4">Test
                FALSE</button>
            <button onclick="testTrueVerdict()" class="px-6 py-3 bg-green-600 text-white font-bold rounded">Test
                TRUE</button>
        </div>

        <section id="results-section" style="display: block;">
            <div id="result-container" class="result-container"></div>
        </section>
    </div>

    <script src="../static/js/verification.js"></script>

    <script>
        // Test functions that simulate API responses
        function testFalseVerdict() {
            const mockResult = {
                verdict: 'FALSE',
                confidence: 0.92,
                bias: 'Neutral',
                evidence: [
                    {
                        title: 'NASA Climate Report',
                        snippet: 'Scientific evidence overwhelmingly demonstrates that climate change is real and human-caused.',
                        url: 'https://climate.nasa.gov',
                        date: '2023-03-15',
                        entailment_label: 'CONTRADICTS'
                    },
                    {
                        title: 'IPCC Assessment',
                        snippet: 'The Intergovernmental Panel on Climate Change confirms unprecedented warming trends.',
                        url: 'https://ipcc.ch',
                        date: '2023-02-10',
                        entailment_label: 'CONTRADICTS'
                    }
                ]
            };

            const resultContainer = document.getElementById('result-container');
            const resultsSection = document.getElementById('results-section');
            displayResults(mockResult, 'Climate change is a hoax.');
        }

        function testTrueVerdict() {
            const mockResult = {
                verdict: 'TRUE',
                confidence: 0.99,
                bias: 'Scientific Consensus',
                evidence: [
                    {
                        title: 'NASA Solar System Overview',
                        snippet: 'Earth completes one orbit around the Sun every 365.25 days.',
                        url: 'https://solarsystem.nasa.gov',
                        date: '2023-01-20',
                        entailment_label: 'SUPPORTS'
                    },
                    {
                        title: 'European Space Agency',
                        snippet: 'Heliocentric model confirmed through precise astronomical measurements.',
                        url: 'https://esa.int',
                        date: '2023-03-05',
                        entailment_label: 'SUPPORTS'
                    }
                ]
            };

            const resultContainer = document.getElementById('result-container');
            const resultsSection = document.getElementById('results-section');
            displayResults(mockResult, 'The Earth orbits around the Sun.');
        }
    </script>
</body>

</html>
